{% extends 'base.html' %}

{% block title %}Change Password - AutoDrive{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-custom p-4 fade-in-up" style="border-radius: 16px;">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <i class="bi bi-key-fill text-primary" style="font-size: 3rem; filter: drop-shadow(0 4px 10px rgba(79, 70, 229, 0.15));"></i>
                            <h3 class="mt-2 fw-bold text-dark">Change Password</h3>
                            <p class="text-muted">Enter your new secure password details</p>
                        </div>
                        
                        <!-- Alerts -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} border-0 py-2.5 px-3 mb-3 small" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                        
                        <form method="POST" novalidate>
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold text-muted">New Password</label>
                                <input type="password" name="password" id="password" class="form-control py-2.5" placeholder="Minimum 6 characters" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label fw-semibold text-muted">Confirm New Password</label>
                                <input type="password" name="confirm_password" id="confirm_password" class="form-control py-2.5" placeholder="Confirm your new password" required>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-custom-primary py-2.5">
                                    <i class="bi bi-check-circle-fill me-1"></i>Save & Reset Password
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
