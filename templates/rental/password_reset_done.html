{% extends 'base.html' %}

{% block title %}Reset Link Sent - AutoDrive{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-custom p-4 fade-in-up">
                    <div class="card-body text-center">
                        <i class="bi bi-envelope-check-fill text-success" style="font-size: 3.5rem; filter: drop-shadow(0 4px 10px rgba(13, 148, 136, 0.15));"></i>
                        <h3 class="mt-3 fw-bold text-dark">Reset Link Sent</h3>
                        <p class="text-muted my-3">
                            We've sent a password reset security link to your registered email address. Please check your inbox (and spam folder) to proceed.
                        </p>

                        <div class="d-grid gap-2">
                            <a href="{% url 'login' %}" class="btn btn-custom-primary py-2.5">
                                Return to Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
