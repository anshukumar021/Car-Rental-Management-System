{% extends 'base.html' %}

{% block title %}Password Reset Complete - AutoDrive{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-custom p-4 fade-in-up">
                    <div class="card-body text-center">
                        <i class="bi bi-shield-check text-success" style="font-size: 3.5rem; filter: drop-shadow(0 4px 10px rgba(13, 148, 136, 0.15));"></i>
                        <h3 class="mt-3 fw-bold text-dark">Password Updated</h3>
                        <p class="text-muted my-3">
                            Your password has been reset successfully. You can now login with your new password credentials.
                        </p>

                        <div class="d-grid gap-2">
                            <a href="{% url 'login' %}" class="btn btn-custom-primary py-2.5">
                                Sign In Now
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
